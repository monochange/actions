name: monochange actions
description: 'Run monochange GitHub Action variants from a single entrypoint.'
author: monochange
branding:
  icon: git-merge
  color: purple
inputs:
  name:
    description: 'Action variant to run. Supported values: merge, setup-monochange, changeset-policy, check, release-preview, release-record, open-release-request, release-pr, tag-release, publish-readiness, publish-packages, post-merge-release, fail-when.'
    required: true
  setup-monochange:
    description: 'How to resolve monochange. true = auto-resolve (default), false = require existing monochange on PATH, any other string = custom command.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token used to inspect and fast-forward pull requests.'
    required: false
    default: ${{ github.token }}
  repository:
    description: 'Target repository in owner/repo format.'
    required: false
    default: ${{ github.repository }}
  pull-request:
    description: 'Optional pull request number. Leave empty to use the current PR event context or auto-detect a single open release pull request.'
    required: false
  base-branch:
    description: 'Base branch that the release pull request must target.'
    required: false
    default: main
  head-branch-prefix:
    description: 'Required prefix for the release pull request head branch.'
    required: false
    default: monochange/release/
  merge-method:
    description: 'How to update the base branch. fast-forward preserves the head commit SHA; cherry-pick replays each PR commit with -x so checks run on new SHAs while preserving commit messages and author metadata.'
    required: false
    default: fast-forward
    type: choice
    options:
      - fast-forward
      - cherry-pick
  required-failing-check:
    description: 'Optional check name that is expected to fail before the merge update.'
    required: false
    default: release-pr-manual-merge-blocker
  allow-cross-repository:
    description: 'Whether pull requests from forks are allowed.'
    required: false
    default: 'false'
  require-green-checks:
    description: 'Whether all checks must be complete and successful apart from the expected failing check.'
    required: false
    default: 'true'
  minimum-reviewer-permission:
    description: 'Minimum repository permission the triggering actor must have for the merge to proceed. admin = repository admin (default), maintain = maintainer role, push = merge (insecure).'
    required: false
    default: admin
    type: choice
    options:
      - admin
      - maintain
      - push
  comment:
    description: 'Whether to post a pull request comment. Supported values: always, never, on-error.'
    required: false
    default: on-error
  dry-run:
    description: 'Resolve and validate the pull request without updating the base branch.'
    required: false
    default: 'false'
  debug:
    description: 'Enable extra debug logging.'
    required: false
    default: 'false'
  update-branch-on-failure:
    description: 'When true, if the head branch is not a fast-forward of the base branch, rebase the head branch onto the latest base branch and force-push it instead of failing immediately.'
    required: false
    default: 'false'
  post-update-script:
    description: 'Optional shell command to run after a successful rebase and force-push, before the fast-forward merge. Runs in the temporary git workspace.'
    required: false
  post-update-workflow:
    description: 'Optional workflow file path to dispatch via workflow_dispatch after a successful rebase and force-push. Runs on the base branch.'
    required: false
  trigger-command:
    description: 'Slash command that triggers this action when posted as a pull request comment. Only validated when the workflow runs from an issue_comment event.'
    required: false
    default: '/merge'
  should-fail:
    description: 'Boolean-like condition result for the fail-when variant. When true, fail-when writes outputs and a summary, optionally posts fail-comment to the PR, then fails with reason.'
    required: false
    default: 'false'
  reason:
    description: 'Failure reason shown in the thrown error, action summary, reason output, and optional pull request comment when should-fail is true.'
    required: false
    default: 'fail-when condition evaluated to true.'
  fail-comment:
    description: 'Optional markdown to include in a pull request comment when should-fail is true. If omitted, fail-when never calls the GitHub API.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory to run monochange in.'
    required: false
    default: '.'
  ref:
    description: 'Git ref to inspect for release-record, tag-release, and publish-readiness.'
    required: false
    default: 'HEAD'
  format:
    description: 'monochange output format for variants that support it.'
    required: false
    default: 'json'
  diff:
    description: 'Whether release-preview should include a diff.'
    required: false
    default: 'true'
  output:
    description: 'Output artifact path for publish-readiness or publish-packages.'
    required: false
  resume:
    description: 'Previous publish result path to resume package publishing.'
    required: false
  fail-if-missing:
    description: 'Whether release-record should fail when no release record exists.'
    required: false
    default: 'false'
  id:
    description: 'Package or group id used by tag-release to select one tag from the tags map.'
    required: false
  package:
    description: 'Package or group id used by tag-release to select one tag from the tags map.'
    required: false
  readiness:
    description: 'Readiness artifact path used by publish-plan compatibility mode.'
    required: false
  all:
    description: 'Pass --all to publish-packages.'
    required: false
    default: 'false'
  stream-output:
    description: 'Pass --stream-output to publish-packages so package-manager output streams while still being captured in the publish report.'
    required: false
    default: 'false'
outputs:
  result:
    description: 'Final action result. For fail-when, this is skipped when should-fail is false and failed when the dispatcher catches the intentional failure.'
  failed:
    description: 'For fail-when, whether the action intentionally failed (true) or skipped (false).'
  reason:
    description: 'For fail-when, the failure reason when should-fail was true.'
  merged:
    description: 'Whether the pull request was merged into the base branch.'
  pull-request-number:
    description: 'Resolved pull request number.'
  pull-request-url:
    description: 'Resolved pull request URL.'
  base-sha:
    description: 'Base branch SHA before the fast-forward attempt.'
  head-sha:
    description: 'Head commit SHA used for validation.'
  fast-forward-sha:
    description: 'Commit SHA pushed to the base branch after a successful merge, or the candidate SHA reported during dry-run mode. Kept for backwards compatibility.'
  comment:
    description: 'JSON comment payload with a body field. For fail-when, this is the generated fail-comment body when provided.'
  rebased:
    description: 'Whether the head branch was rebased onto the base branch before the fast-forward.'
  json:
    description: 'JSON output for monochange command variants.'
  summary:
    description: 'Text summary for monochange command variants.'
  has-release-record:
    description: 'Whether a monochange release record exists at the requested ref.'
  tags:
    description: 'JSON map of release tags by package or group id.'
  tag:
    description: 'Selected release tag for a requested package or group id.'
  ready:
    description: 'Whether publish-readiness found a ready release record.'
  output-path:
    description: 'Path to the generated monochange artifact.'
runs:
  using: node24
  main: dist/index.mjs
