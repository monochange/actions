name: integration

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write

jobs:
  setup-monochange:
    name: setup-monochange smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: install monochange breaking CLI fixture
        run: cargo install --git https://github.com/monochange/monochange --rev 2a1b3ef538507a254625d1d06dcc10f6ccf8fb7e monochange

      - name: use setup-monochange action
        uses: ./setup-monochange
        with:
          debug: true
          setup-monochange: false

      - name: verify monochange is available
        run: monochange --version

  merge-action-validates:
    name: merge action validates PR context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: run merge action (dry-run, no actual merge)
        uses: ./merge
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-branch: main
          require-green-checks: false
          require-merge-blocker: false

      - name: verify merge action ran without error
        run: echo "merge action completed"
