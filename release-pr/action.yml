name: release-pr
description: 'Create or update the release pull request using monochange.'
author: monochange
inputs:
  setup-monochange:
    description: 'How to resolve monochange. true = auto-resolve (default), false = require existing mc on PATH, any other string = custom command.'
    required: false
    default: 'true'
  format:
    description: 'Output format for the release PR metadata.'
    required: false
    default: 'json'
  dry-run:
    description: 'Show what would be done without creating the PR.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token used to create the pull request.'
    required: false
  working-directory:
    description: 'Working directory to run monochange in.'
    required: false
    default: '.'
  debug:
    description: 'Enable extra debug logging.'
    required: false
    default: 'false'
outputs:
  result:
    description: 'success, dry-run, or failed.'
  head-branch:
    description: 'Release PR head branch.'
  base-branch:
    description: 'Release PR base branch.'
  release-request-number:
    description: 'PR number.'
  release-request-url:
    description: 'PR URL.'
  json:
    description: 'Full JSON metadata.'
runs:
  using: node24
  main: ../dist/index.mjs
