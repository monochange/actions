[package]
name = "@monochange/actions"
version = "0.0.0"
private = true
license = "MIT"
repository = "https://github.com/monochange/actions"

[[workflows]]
name = "release"
description = "Prepares a changeset and version bump for the actions repository"

[workflows.steps.pre]
name = "format"
command = "pnpm fmt:check"

[workflows.steps.pre]
name = "lint"
command = "pnpm lint"

[workflows.steps.pre]
name = "typecheck"
command = "pnpm check"

[workflows.steps.pre]
name = "test"
command = "pnpm test -- --coverage"

[workflows.steps.version]
name = "version"
# For now, monochange doesn't have a native GitHub Actions release flow.
# This is tracked in https://github.com/monochange/monochange/issues/...
command = "echo 'Manual version bump required: update package.json and tag with vX.Y.Z'"

[workflows.steps.publish]
name = "publish"
# GitHub Actions release: push a tag and release, not npm publish.
command = "echo 'Manual release required: git tag + release'"
